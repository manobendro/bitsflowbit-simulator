server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        demo.html index.html;

    # nginx's default mime.types (included at the http level) already maps
    # .wasm -> application/wasm, .js -> application/javascript, etc. We
    # deliberately do NOT define a server-scoped `types {}` block here, since
    # that would replace the entire map rather than extend it.

    location / {
        try_files $uri $uri/ =404;

        # Cross-origin isolation (harmless for the asyncify build, and
        # required if the simulator is ever upgraded to use threads).
        add_header Cross-Origin-Opener-Policy   same-origin;
        add_header Cross-Origin-Embedder-Policy  require-corp;
        add_header Cross-Origin-Resource-Policy  cross-origin;
    }
}
